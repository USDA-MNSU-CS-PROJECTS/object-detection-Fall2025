name: daveBot-project-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip
  - notebook
  - postgresql
  - ipykernel # lets you use this env as a kernel in Jupyter
  - pillow
  - pip:
      - nd2reader
      - tifffile
      - attrs
      - boxsdk
      - certifi
      - cffi
      - charset-normalizer
      - cryptography
      - idna
      - PyJWT
      - python-dateutil
      - python-dotenv
      - requests
      - requests-toolbelt
      - six
      - typing-extensions
      - urllib3
      - pycparser
      - setuptools
      - label-studio
      - rembg
      - nd2
